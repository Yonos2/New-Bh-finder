<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | BH Finder</title>
  <link rel="icon" href="images/bh2.png" type="image/jpeg">
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 rounded-4" style="max-width: 400px; width: 100%;">
      <div class="text-center mb-4">
        <i class="bi bi-key-fill fs-1 text-primary"></i>
        <h3 class="fw-bold mt-2">Reset Password</h3>
        <p class="text-muted">Verify your identity to reset password</p>
      </div>

      <form id="forgotPasswordForm">
        <!-- Step 1: Verification -->
        <div id="verificationStep">
          <div class="mb-3">
            <label for="username" class="form-label small">Username</label>
            <input type="text" class="form-control" id="username" required autocomplete="username">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label small">Email Address</label>
            <input type="email" class="form-control" id="email" required autocomplete="email">
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold" id="verifyBtn">Verify Identity</button>
        </div>

        <!-- Step 2: New Password (Hidden initially) -->
        <div id="resetStep" class="d-none">
          <div class="alert alert-success small py-2"><i class="bi bi-check-circle-fill"></i> Identity Verified!</div>
          <div class="mb-3">
            <label for="newPassword" class="form-label small">New Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="newPassword" autocomplete="new-password">
              <button class="btn btn-outline-secondary" type="button" id="toggleNewPass"><i class="bi bi-eye-slash"></i></button>
            </div>
          </div>
          <div class="mb-3">
            <label for="confirmPassword" class="form-label small">Confirm Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="confirmPassword" autocomplete="new-password">
              <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPass"><i class="bi bi-eye-slash"></i></button>
            </div>
          </div>
          <button type="button" class="btn btn-success w-100 fw-semibold" id="resetBtn">Reset Password</button>
        </div>

        <div class="text-center mt-3">
          <a href="user-login.html" class="text-decoration-none small text-secondary"><i class="bi bi-arrow-left"></i> Back to Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
