<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign Up | BH Finder</title>
   <link rel="icon" href="images/bh2.png" type="image/jpeg">
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 rounded-4" style="max-width: 400px; width: 100%;">
      <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
        <h3 class="fw-bold mt-2">Admin Sign Up</h3>
        <p class="text-muted">Create an admin account to manage the system</p>
      </div>

      <form id="signupForm" method="POST">
        <div class="mb-3">
          <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Full Name" required autocomplete="name">
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autocomplete="username">
        </div>
        <div class="mb-3">
          <input type="email" class="form-control" id="email" name="email" placeholder="Email" required autocomplete="email">
        </div>
        <!--  [GI-USAB] Gihimong input group para sa show/hide password -->
        <div class="mb-3 input-group">
          <input type="password" class="form-control" id="password" name="password" placeholder="Password" required autocomplete="new-password">
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
        <input type="hidden" id="role" name="role" value="admin">
        <!-- [GI-USAB] Field para sa Admin Secret Key -->
        <div class="mb-3">
          <input type="password" class="form-control" id="secret_key" name="secret_key" placeholder="Admin Secret Key" required autocomplete="new-password">
        </div>
        <!--  [BAG-O] Checkbox para ipakita ang secret key -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="showSecretKey">
          <label class="form-check-label small" for="showSecretKey">
            Show Secret Key
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign Up</button>
        <div class="text-center mt-3">
          <small>Already have an account? <a href="admin-login.html" class="text-primary fw-semibold">Login</a></small>
        </div>
      </form>
    </div>
  </div>

  <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  <!-- [GI-USAB] Gigamit na ang bag-ong admin-signup.js para sa admin-specific logic -->
  <script src="admin-signup.js"></script>

</body>
</html>
