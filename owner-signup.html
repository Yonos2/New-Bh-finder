<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Sign Up | BH Finder</title>
   <link rel="icon" href="images/bh2.png" type="image/jpeg">

  <!-- 🎨 Bootstrap styling -->
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
  <!-- 🏠 Centered signup card -->
  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="card shadow-lg p-4 rounded-4" style="max-width: 450px; width: 100%;">
      <div class="text-center mb-4">
        <i class="bi bi-house-heart-fill fs-1 text-primary"></i>
        <h3 class="fw-bold mt-2">Boarding House Owner Signup</h3>
        <p class="text-muted">Register to list your property</p>
      </div>

      <!-- ✅ Owner Signup Form -->
      <form id="signupForm">
        <div class="mb-3">
          <input type="text" class="form-control" id="fullname" name="full_name" placeholder="Full Name" required autocomplete="name">
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autocomplete="username">
        </div>
        <div class="mb-3">
          <input type="email" class="form-control" id="email" name="email" placeholder="Email Address" required autocomplete="email">
        </div>
        <div class="mb-3 input-group">
          <input type="password" class="form-control" id="password" name="password" placeholder="Password" required autocomplete="new-password">
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
        <div class="mb-3">
          <input type="tel" class="form-control" id="phone" name="phone" placeholder="Phone Number" required autocomplete="tel">
        </div>
        
        <!-- Hidden input para sa role -->
        <input type="hidden" id="role" name="role" value="owner">

        <!-- Mga field para sa Owner, kanunay makita -->
        <div id="ownerFields" class="mt-3 border-top pt-3">
          <p class="text-muted small fw-semibold">Please provide the following for verification:</p>
          <div class="mb-3">
            <label for="idPicture" class="form-label small">Owner's ID Picture <span class="text-danger">*</span></label>
            <input type="file" class="form-control form-control-sm" id="idPicture" name="idPicture" accept="image/*,application/pdf" required>
            <div class="form-text small">
              Upload a clear photo of a valid government-issued ID.
            </div>
          </div>
          <div class="mb-3">
            <label for="businessPermit" class="form-label small">Business Permit (Image or PDF) <span class="text-danger">*</span></label>
            <input type="file" class="form-control form-control-sm" id="businessPermit" name="businessPermit" accept="image/*,application/pdf" required>
            <div class="form-text small">Upload a clear photo of your latest business permit.</div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign Up as Owner</button>

        <div class="text-center mt-3">
          <small>
            Already have an account?
            <a href="user-login.html" class="text-primary fw-semibold">Login Here</a>
          </small>
        </div>
      </form>
    </div>
  </div>

  <!-- ⚙️ JS libraries -->
  <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  <!-- Gigamit gihapon ang signup.js kay kaya na niya i-handle ang owner-specific fields -->
  <script src="signup.js"></script>

</body>
</html>
