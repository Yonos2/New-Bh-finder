<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | BH Finder</title>
   <link rel="icon" href="images/bh2.png" type="image/jpeg">
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 rounded-4" style="max-width: 400px; width: 100%;">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill fs-1 text-primary"></i>
        <h3 class="fw-bold mt-2">Admin Login</h3>
        <p class="text-muted">Enter your credentials to login</p>
      </div>

      <form id="adminLoginForm">
        <div class="mb-3">
          <input type="text" class="form-control" id="username" placeholder="Username" required autocomplete="username">
        </div>
        <!-- 👁️ [GI-USAB] Gihimong input group para sa show/hide password -->
        <div class="mb-3 input-group">
          <input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">Login</button>
        <div class="text-center mt-3">
          <small>Don't have an account? <a href="admin-signup.html" class="text-primary fw-semibold">Sign Up</a></small>
        </div>
      </form>
    </div>
  </div>

  <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  <!-- [GI-USAB] Gigamit na ang dedikado nga script para sa admin login -->
  <script src="admin-login.js"></script>
</body>
</html>
